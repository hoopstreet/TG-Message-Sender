name: Docker Build and Northflank Sync

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          ref: main
          fetch-depth: 0

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Version
        id: vars
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and Push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tg-message-sender:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/tg-message-sender:${{ steps.vars.outputs.tag }}

      # This triggers the Northflank "Redeploy" which pulls the new 'latest' image
      - name: Redeploy Northflank Service
        run: |
          curl -X POST https://api.northflank.com/v1/projects/tg-automation/services/tg-sender-service/redeploy \
            -H "Authorization: Bearer ${{ secrets.NORTHFLANK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{}'
