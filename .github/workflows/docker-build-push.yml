name: Docker Build and Versioning

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          ref: main
          fetch-depth: 0

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Version
        id: vars
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and Push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tg-message-sender:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/tg-message-sender:${{ steps.vars.outputs.tag }}

      - name: Update hf.Dockerfile and Sync to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Update the version inside hf.Dockerfile
          sed -i "s|FROM .*|FROM ${{ secrets.DOCKERHUB_USERNAME }}/tg-message-sender:${{ steps.vars.outputs.tag }}|" hf.Dockerfile
          
          # 2. Commit and Push change to GitHub
          git config user.name "Version Authority"
          git config user.email "actions@github.com"
          git add hf.Dockerfile
          git commit -m "chore: sync hf.Dockerfile to ${{ steps.vars.outputs.tag }}"
          git push origin main

          # 3. IMMEDIATELY Push to Hugging Face (The Chain Reaction)
          git remote add hf https://hoopstreet:$HF_TOKEN@huggingface.co/spaces/hoopstreet/TG-Message-Sender
          git checkout -b hf-deploy
          mv hf.Dockerfile Dockerfile
          find . -maxdepth 1 ! -name 'Dockerfile' ! -name 'README.md' ! -name '.git' -exec rm -rf {} +
          git add .
          git commit -m "Deploy to HF Space: ${{ steps.vars.outputs.tag }}"
          git push -f hf hf-deploy:main
