name: Build and Deploy to Northflank

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tg-message-sender:latest

      - name: Deploy to Northflank
        run: |
          curl -X POST https://api.northflank.com/v1/projects/tg-automation/services/tg-message-sender/deployment \
            -H "Authorization: Bearer ${{ secrets.NORTHFLANK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"image": "${{ secrets.DOCKERHUB_USERNAME }}/tg-message-sender:latest"}'
